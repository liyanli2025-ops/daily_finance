<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经日报 - Finance Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        header p {
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
        }
        
        /* 导航标签 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .tab-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            box-shadow: 0 4px 15px rgba(0,212,255,0.4);
        }
        
        /* 内容区域 */
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 卡片 */
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(0,212,255,0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        
        /* 按钮 */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,212,255,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: linear-gradient(90deg, #00c853, #00a844);
            color: #fff;
        }
        
        .btn-danger {
            background: linear-gradient(90deg, #ff5252, #d32f2f);
            color: #fff;
        }
        
        /* 输入框 */
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .data-table th {
            color: #00d4ff;
            font-weight: 600;
        }
        
        .data-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        /* 状态标签 */
        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-pending {
            background: rgba(255,193,7,0.2);
            color: #ffc107;
        }
        
        .status-completed {
            background: rgba(76,175,80,0.2);
            color: #4caf50;
        }
        
        .status-error {
            background: rgba(244,67,54,0.2);
            color: #f44336;
        }
        
        /* 涨跌颜色 */
        .price-up {
            color: #4caf50;
        }
        
        .price-down {
            color: #f44336;
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast-success {
            background: linear-gradient(90deg, #00c853, #00a844);
        }
        
        .toast-error {
            background: linear-gradient(90deg, #ff5252, #d32f2f);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        /* 报告内容 */
        .report-content {
            line-height: 1.8;
            white-space: pre-wrap;
        }
        
        .report-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        /* 股票行情卡片 */
        .stock-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stock-info h4 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .stock-info .code {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        
        .stock-price {
            text-align: right;
        }
        
        .stock-price .price {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .stock-price .change {
            font-size: 0.95rem;
        }
        
        /* 添加自选股表单 */
        .add-stock-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-stock-form input {
            flex: 1;
            min-width: 150px;
            margin-bottom: 0;
        }
        
        /* 播客播放器 */
        .podcast-player {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
        }
        
        .podcast-player audio {
            width: 100%;
            margin-top: 15px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .tabs {
                flex-direction: column;
                align-items: stretch;
            }
            
            .tab-btn {
                text-align: center;
            }
            
            .data-table {
                font-size: 0.9rem;
            }
            
            .data-table th,
            .data-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 财经日报</h1>
            <p>Finance Daily - AI 驱动的每日财经简报</p>
        </header>
        
        <!-- 导航标签 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('reports')">📑 每日报告</button>
            <button class="tab-btn" onclick="switchTab('stocks')">📈 自选股</button>
            <button class="tab-btn" onclick="switchTab('podcasts')">🎧 播客</button>
        </div>
        
        <!-- 报告模块 -->
        <div id="reports" class="tab-content active">
            <div class="card">
                <h3>📑 今日报告</h3>
                <div id="today-report">
                    <div class="empty-state">
                        <div class="icon">📄</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>🔧 操作</h3>
                <button class="btn btn-primary" onclick="generateReport()">🔄 生成新报告</button>
                <button class="btn btn-secondary" onclick="loadTodayReport()">📥 刷新报告</button>
            </div>
            
            <div class="card">
                <h3>📚 历史报告</h3>
                <div id="reports-list">
                    <div class="empty-state">
                        <div class="icon">📂</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 自选股模块 -->
        <div id="stocks" class="tab-content">
            <div class="card">
                <h3>➕ 添加自选股</h3>
                <div class="add-stock-form">
                    <input type="text" id="stock-code" placeholder="股票代码，如 600519">
                    <input type="text" id="stock-name" placeholder="股票名称，如 贵州茅台">
                    <button class="btn btn-success" onclick="addStock()">添加</button>
                </div>
            </div>
            
            <div class="card">
                <h3>📈 我的自选股</h3>
                <div id="watchlist">
                    <div class="empty-state">
                        <div class="icon">📊</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 播客模块 -->
        <div id="podcasts" class="tab-content">
            <div class="card">
                <h3>🎧 今日播客</h3>
                <div id="today-podcast">
                    <div class="empty-state">
                        <div class="icon">🎙️</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>📜 播客历史</h3>
                <div id="podcast-history">
                    <div class="empty-state">
                        <div class="icon">📻</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000/api';
        
        // 切换标签
        function switchTab(tabId) {
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 更新内容显示
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            // 加载对应数据
            if (tabId === 'reports') {
                loadTodayReport();
                loadReportsList();
            } else if (tabId === 'stocks') {
                loadWatchlist();
            } else if (tabId === 'podcasts') {
                loadTodayPodcast();
                loadPodcastHistory();
            }
        }
        
        // 显示提示消息
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // ========== 报告模块 ==========
        
        async function loadTodayReport() {
            const container = document.getElementById('today-report');
            try {
                const res = await fetch(`${API_BASE}/reports/today`);
                if (!res.ok) {
                    throw new Error(`服务器错误 (${res.status})`);
                }
                const text = await res.text();
                const data = text ? JSON.parse(text) : null;
                
                if (!data || data.status === 'not_found' || !data.id) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📄</div>
                            <p>今天还没有报告，点击上方"生成新报告"按钮创建！</p>
                        </div>
                    `;
                } else {
                    // 兼容后端字段名：report_date -> date, podcast_status -> status
                    const reportDate = data.report_date || data.date || '今天';
                    const reportStatus = data.status || 'pending';
                    container.innerHTML = `
                        <div class="report-meta">
                            <span>📅 ${reportDate}</span>
                            <span class="status status-${reportStatus === 'completed' ? 'completed' : 'pending'}">${reportStatus}</span>
                        </div>
                        <h4 style="margin-bottom: 15px; font-size: 1.2rem;">${data.title || '每日财经简报'}</h4>
                        <div class="report-content">${data.content || '报告内容生成中...'}</div>
                    `;
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>加载失败：${err.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">请确保后端服务正在运行 (localhost:8000)</p>
                    </div>
                `;
            }
        }
        
        async function loadReportsList() {
            const container = document.getElementById('reports-list');
            try {
                const res = await fetch(`${API_BASE}/reports/`);
                if (!res.ok) {
                    throw new Error(`服务器错误 (${res.status})`);
                }
                const text = await res.text();
                const data = text ? JSON.parse(text) : [];
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📂</div>
                            <p>暂无历史报告</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>标题</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(report => {
                                    // 兼容后端字段名：report_date -> date
                                    const reportDate = report.report_date || report.date || '-';
                                    const reportStatus = report.status || 'pending';
                                    return `
                                    <tr>
                                        <td>${reportDate}</td>
                                        <td>${report.title || '每日财经简报'}</td>
                                        <td><span class="status status-${reportStatus === 'completed' ? 'completed' : 'pending'}">${reportStatus}</span></td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (err) {
                container.innerHTML = `<p style="color: rgba(255,255,255,0.5);">加载失败</p>`;
            }
        }
        
        // 记录当前报告ID，用于判断是否生成了新报告
        let currentReportId = null;
        
        async function generateReport() {
            showToast('🚀 正在生成报告，请稍候...', 'success');
            
            // 显示生成中状态
            const todayContainer = document.getElementById('today-report');
            todayContainer.innerHTML = `
                <div style="text-align: center; padding: 30px;">
                    <div class="loading" style="width: 40px; height: 40px; border-width: 3px; margin: 0 auto 20px;"></div>
                    <h4 style="margin-bottom: 10px;">📝 正在生成报告...</h4>
                    <p style="color: rgba(255,255,255,0.6);" id="generation-status">正在调用 DeepSeek AI 分析...</p>
                    <p style="color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 10px;">预计需要 1-2 分钟，请耐心等待...</p>
                    <p style="color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-top: 5px;" id="generation-timer">已等待: 0 秒</p>
                </div>
            `;
            
            // 启动计时器
            let seconds = 0;
            const timerInterval = setInterval(() => {
                seconds++;
                const timerEl = document.getElementById('generation-timer');
                if (timerEl) {
                    timerEl.textContent = `已等待: ${seconds} 秒`;
                }
                // 更新状态提示
                const statusEl = document.getElementById('generation-status');
                if (statusEl) {
                    if (seconds < 10) {
                        statusEl.textContent = '正在采集新闻...';
                    } else if (seconds < 30) {
                        statusEl.textContent = '正在调用 DeepSeek AI 分析...';
                    } else if (seconds < 60) {
                        statusEl.textContent = 'AI 正在生成报告内容...';
                    } else if (seconds < 90) {
                        statusEl.textContent = '正在生成播客音频...';
                    } else {
                        statusEl.textContent = '正在保存报告...';
                    }
                }
            }, 1000);
            
            try {
                // 使用同步端点，等待报告生成完成
                console.log('[DEBUG] 调用 /api/generate-report-sync...');
                const res = await fetch(`${API_BASE}/generate-report-sync`, { 
                    method: 'POST',
                    // 增加超时时间
                    signal: AbortSignal.timeout(300000) // 5分钟超时
                });
                
                clearInterval(timerInterval);
                
                console.log('[DEBUG] HTTP状态码:', res.status, res.statusText);
                
                // 先检查HTTP状态
                if (!res.ok) {
                    const errorText = await res.text();
                    console.log('[DEBUG] HTTP错误响应:', errorText);
                    showToast(`❌ 服务器错误 (${res.status}): ${errorText || res.statusText}`, 'error');
                    loadTodayReport();
                    return;
                }
                
                const responseText = await res.text();
                console.log('[DEBUG] 原始响应:', responseText);
                
                let data;
                try {
                    data = JSON.parse(responseText);
                } catch (parseErr) {
                    console.log('[DEBUG] JSON解析失败:', parseErr);
                    showToast('❌ 响应解析失败: ' + responseText.substring(0, 100), 'error');
                    loadTodayReport();
                    return;
                }
                
                console.log('[DEBUG] generate-report-sync 响应:', data);
                
                if (data.status === 'success') {
                    showToast('✅ 报告生成完成！', 'success');
                    loadTodayReport();
                    loadReportsList();
                } else {
                    showToast('❌ 生成失败: ' + (data.message || JSON.stringify(data)), 'error');
                    loadTodayReport();
                }
            } catch (err) {
                clearInterval(timerInterval);
                console.log('[DEBUG] 生成报告出错:', err);
                console.log('[DEBUG] 错误类型:', err.name);
                console.log('[DEBUG] 错误详情:', err.stack);
                if (err.name === 'TimeoutError') {
                    showToast('⚠️ 请求超时，请稍后刷新查看', 'error');
                } else if (err.name === 'AbortError') {
                    showToast('⚠️ 请求被中断', 'error');
                } else {
                    showToast('❌ 生成失败：' + (err.message || String(err)), 'error');
                }
                loadTodayReport();
            }
        }
        
        // ========== 自选股模块 ==========
        
        async function loadWatchlist() {
            const container = document.getElementById('watchlist');
            try {
                const res = await fetch(`${API_BASE}/stocks/watchlist`);
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📊</div>
                            <p>还没有自选股，添加一些吧！</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="grid">
                            ${data.map(stock => `
                                <div class="card stock-card" style="margin-bottom: 0;">
                                    <div class="stock-info">
                                        <h4>${stock.name || '未知'}</h4>
                                        <span class="code">${stock.code || stock.symbol || '-'}</span>
                                    </div>
                                    <div class="stock-price">
                                        <div class="price ${stock.change_percent > 0 ? 'price-up' : stock.change_percent < 0 ? 'price-down' : ''}">
                                            ¥${stock.current_price || '--'}
                                        </div>
                                        <div class="change ${stock.change_percent > 0 ? 'price-up' : stock.change_percent < 0 ? 'price-down' : ''}">
                                            ${stock.change_percent ? (stock.change_percent > 0 ? '+' : '') + stock.change_percent.toFixed(2) + '%' : '--'}
                                        </div>
                                    </div>
                                    <button class="btn btn-danger" style="margin-left: 15px;" onclick="removeStock('${stock.id}')">删除</button>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>加载失败：${err.message}</p>
                    </div>
                `;
            }
        }
        
        async function addStock() {
            const code = document.getElementById('stock-code').value.trim();
            const name = document.getElementById('stock-name').value.trim();
            
            if (!code || !name) {
                showToast('请填写股票代码和名称', 'error');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/stocks/watchlist`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symbol: code, name: name })
                });
                
                if (res.ok) {
                    showToast(`已添加 ${name}`, 'success');
                    document.getElementById('stock-code').value = '';
                    document.getElementById('stock-name').value = '';
                    loadWatchlist();
                } else {
                    showToast('添加失败', 'error');
                }
            } catch (err) {
                showToast('添加失败：' + err.message, 'error');
            }
        }
        
        async function removeStock(stockId) {
            try {
                const res = await fetch(`${API_BASE}/stocks/watchlist/${stockId}`, {
                    method: 'DELETE'
                });
                
                if (res.ok) {
                    showToast('已删除', 'success');
                    loadWatchlist();
                } else {
                    showToast('删除失败', 'error');
                }
            } catch (err) {
                showToast('删除失败：' + err.message, 'error');
            }
        }
        
        // ========== 播客模块 ==========
        
        async function loadTodayPodcast() {
            const container = document.getElementById('today-podcast');
            try {
                const res = await fetch(`${API_BASE}/podcasts/today`);
                if (!res.ok) {
                    throw new Error(`服务器错误 (${res.status})`);
                }
                const text = await res.text();
                if (!text) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🎙️</div>
                            <p>今天还没有播客，先生成一份报告吧！</p>
                        </div>
                    `;
                    return;
                }
                const data = JSON.parse(text);
                
                if (!data || data.status === 'not_found' || !data.report_id) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🎙️</div>
                            <p>今天还没有播客，先生成一份报告吧！</p>
                        </div>
                    `;
                } else {
                    // 兼容后端字段名：report_date -> date
                    const podcastDate = data.report_date || data.date || '今天';
                    const podcastStatus = data.podcast_status || 'pending';
                    container.innerHTML = `
                        <div class="podcast-player">
                            <h4>${data.title || '每日财经播客'}</h4>
                            <div class="report-meta">
                                <span>📅 ${podcastDate}</span>
                                <span class="status status-${podcastStatus === 'completed' ? 'completed' : 'pending'}">${podcastStatus}</span>
                                ${data.podcast_duration ? `<span>⏱️ ${Math.floor(data.podcast_duration / 60)}分${data.podcast_duration % 60}秒</span>` : ''}
                            </div>
                            ${data.podcast_url ? `
                                <audio controls style="width: 100%; margin-top: 15px;">
                                    <source src="http://localhost:8000${data.podcast_url}" type="audio/mpeg">
                                    您的浏览器不支持音频播放
                                </audio>
                            ` : '<p style="margin-top: 15px; color: rgba(255,255,255,0.5);">播客音频生成中...</p>'}
                        </div>
                        <button class="btn btn-primary" style="margin-top: 15px;" onclick="regeneratePodcast('${data.report_id}')">🔄 重新生成播客</button>
                    `;
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>加载失败：${err.message}</p>
                    </div>
                `;
            }
        }
        
        async function loadPodcastHistory() {
            const container = document.getElementById('podcast-history');
            try {
                const res = await fetch(`${API_BASE}/podcasts/history`);
                if (!res.ok) {
                    throw new Error(`服务器错误 (${res.status})`);
                }
                const text = await res.text();
                const data = text ? JSON.parse(text) : [];
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📻</div>
                            <p>暂无播客历史</p>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>日期</th>
                                    <th>标题</th>
                                    <th>时长</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.map(podcast => {
                                    // 兼容后端字段名：report_date -> date, podcast_status -> status
                                    const podcastDate = podcast.report_date || podcast.date || '-';
                                    const podcastDuration = podcast.podcast_duration || podcast.duration;
                                    const podcastStatus = podcast.podcast_status || podcast.status || 'pending';
                                    return `
                                    <tr>
                                        <td>${podcastDate}</td>
                                        <td>${podcast.title || '每日播客'}</td>
                                        <td>${podcastDuration ? Math.floor(podcastDuration / 60) + '分' + podcastDuration % 60 + '秒' : '-'}</td>
                                        <td><span class="status status-${podcastStatus === 'completed' ? 'completed' : 'pending'}">${podcastStatus}</span></td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                    `;
                }
            } catch (err) {
                container.innerHTML = `<p style="color: rgba(255,255,255,0.5);">加载失败</p>`;
            }
        }
        
        async function regeneratePodcast(reportId) {
            showToast('正在生成播客...', 'success');
            try {
                const res = await fetch(`${API_BASE}/podcasts/${reportId}/regenerate`, { method: 'POST' });
                const data = await res.json();
                showToast('播客生成已启动！', 'success');
                setTimeout(loadTodayPodcast, 2000);
            } catch (err) {
                showToast('生成失败：' + err.message, 'error');
            }
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadTodayReport();
            loadReportsList();
        });
    </script>
</body>
</html>
