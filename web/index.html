<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>财经日报 - Finance Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 头部 */
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        header p {
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
        }
        
        /* 导航标签 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .tab-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .tab-btn.active {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            box-shadow: 0 4px 15px rgba(0,212,255,0.4);
        }
        
        /* 内容区域 */
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        /* 播客Tab特殊处理：使用visibility隐藏以保持audio播放 */
        #podcasts {
            display: block !important;
        }
        
        #podcasts:not(.active) {
            visibility: hidden;
            position: absolute;
            left: -9999px;
            height: 0;
            overflow: hidden;
        }
        
        #podcasts.active {
            visibility: visible;
            position: relative;
            left: 0;
            height: auto;
            overflow: visible;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 卡片 */
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(0,212,255,0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .card h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #00d4ff;
        }
        
        /* 按钮 */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 5px;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,212,255,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            cursor: pointer;
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: linear-gradient(90deg, #00c853, #00a844);
            color: #fff;
        }
        
        .btn-danger {
            background: linear-gradient(90deg, #ff5252, #d32f2f);
            color: #fff;
        }
        
        /* 输入框 */
        input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0,212,255,0.3);
        }
        
        input::placeholder, textarea::placeholder {
            color: rgba(255,255,255,0.4);
        }
        
        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .data-table th {
            color: #00d4ff;
            font-weight: 600;
        }
        
        .data-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        /* 状态标签 */
        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-pending {
            background: rgba(255,193,7,0.2);
            color: #ffc107;
        }
        
        .status-completed {
            background: rgba(76,175,80,0.2);
            color: #4caf50;
        }
        
        .status-error {
            background: rgba(244,67,54,0.2);
            color: #f44336;
        }
        
        /* 涨跌颜色 */
        .price-up {
            color: #4caf50;
        }
        
        .price-down {
            color: #f44336;
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 消息提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .toast-success {
            background: linear-gradient(90deg, #00c853, #00a844);
        }
        
        .toast-error {
            background: linear-gradient(90deg, #ff5252, #d32f2f);
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        /* 报告内容 */
        .report-content {
            line-height: 1.8;
            white-space: pre-wrap;
        }
        
        .report-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        
        /* 股票行情卡片 */
        .stock-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stock-info h4 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .stock-info .code {
            color: rgba(255,255,255,0.5);
            font-size: 0.9rem;
        }
        
        .stock-price {
            text-align: right;
        }
        
        .stock-price .price {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .stock-price .change {
            font-size: 0.95rem;
        }
        
        /* 添加自选股表单 */
        .add-stock-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-stock-form input {
            flex: 1;
            min-width: 150px;
            margin-bottom: 0;
        }
        
        /* 播客播放器 */
        .podcast-player {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
        }
        
        .podcast-player audio {
            width: 100%;
            margin-top: 15px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }
            
            .tabs {
                flex-direction: column;
                align-items: stretch;
            }
            
            .tab-btn {
                text-align: center;
            }
            
            .data-table {
                font-size: 0.9rem;
            }
            
            .data-table th,
            .data-table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 财经日报</h1>
            <p>Finance Daily - AI 驱动的每日财经简报</p>
        </header>
        
        <!-- 导航标签 -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('reports')">📑 每日报告</button>
            <button class="tab-btn" onclick="switchTab('stocks')">📈 自选股</button>
            <button class="tab-btn" onclick="switchTab('podcasts')">🎧 播客</button>
        </div>
        
        <!-- 报告模块 -->
        <div id="reports" class="tab-content active">
            <div class="card">
                <h3>📑 今日报告</h3>
                <div id="today-report">
                    <div class="empty-state">
                        <div class="icon">📄</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>🔧 操作</h3>
                <button class="btn btn-primary" onclick="generateReport()" id="generate-btn">🔄 生成今日报告</button>
                <span style="color: rgba(255,255,255,0.5); margin-left: 15px; font-size: 0.9rem;">点击后将采集最新新闻并生成分析报告</span>
            </div>
            
            <div class="card">
                <h3>📚 历史报告</h3>
                <div id="reports-list">
                    <div class="empty-state">
                        <div class="icon">📂</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 自选股模块 -->
        <div id="stocks" class="tab-content">
            <div class="card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                <h3 style="color: white;">💡 自选股说明</h3>
                <p style="margin: 0; opacity: 0.9; font-size: 0.95rem;">
                    你在这里添加的自选股会<strong>自动同步到每日报告和播客</strong>中进行分析。<br>
                    系统会自动采集这些股票的相关新闻和所属行业动态。
                </p>
            </div>
            
            <div class="card">
                <h3>➕ 添加自选股</h3>
                <div class="add-stock-form">
                    <input type="text" id="stock-code" placeholder="股票代码，如 600519">
                    <input type="text" id="stock-name" placeholder="股票名称，如 贵州茅台">
                    <select id="stock-market" style="padding: 10px; border-radius: 8px; border: 1px solid #e0e0e0;">
                        <option value="A">A股</option>
                        <option value="HK">港股</option>
                    </select>
                    <button class="btn btn-success" onclick="addStock()">添加</button>
                </div>
            </div>
            
            <!-- 合并自选股统计 -->
            <div class="card">
                <h3>📊 自选股统计</h3>
                <div id="watchlist-stats">
                    <div class="empty-state">
                        <div class="icon">📈</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
            
            <!-- 行业分布 -->
            <div class="card">
                <h3>🏭 行业分布</h3>
                <div id="sector-distribution">
                    <div class="empty-state">
                        <div class="icon">🔄</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
            
        </div>
        
        <!-- 播客模块 -->
        <div id="podcasts" class="tab-content">
            <div class="card">
                <h3>🎧 今日播客 <button class="btn btn-secondary" style="float: right; padding: 5px 12px; font-size: 0.8rem;" onclick="refreshPodcast()">🔄 刷新</button></h3>
                <div id="today-podcast">
                    <div class="empty-state">
                        <div class="icon">🎙️</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h3>📜 播客历史</h3>
                <div id="podcast-history">
                    <div class="empty-state">
                        <div class="icon">📻</div>
                        <p>加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 自动识别环境：本地开发 vs 服务器部署
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE = isLocal ? 'http://localhost:9090/api' : '/api';
        const AUDIO_BASE = isLocal ? 'http://localhost:9090' : '';
        
        // 标记播客是否已加载过（避免切换Tab时重复加载导致播放中断）
        let podcastLoaded = false;
        
        // 切换标签
        function switchTab(tabId) {
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // 更新内容显示
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            // 加载对应数据
            if (tabId === 'reports') {
                loadTodayReport();
                loadReportsList();
            } else if (tabId === 'stocks') {
                loadWatchlist();
            } else if (tabId === 'podcasts') {
                // 只有首次进入或需要刷新时才加载播客
                // 检查是否有正在播放的音频
                const audio = document.querySelector('#podcasts audio');
                const isPlaying = audio && !audio.paused;
                
                if (!podcastLoaded || !isPlaying) {
                    loadTodayPodcast();
                    loadPodcastHistory();
                    podcastLoaded = true;
                }
                // 如果正在播放，不重新加载，保持播放状态
            }
        }
        
        // 显示提示消息
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // 格式化时间显示（精确到分钟）
        function formatDateTime(dateStr, createdAt) {
            // 优先使用 created_at（包含精确时间）
            if (createdAt) {
                const date = new Date(createdAt);
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hour = String(date.getHours()).padStart(2, '0');
                const minute = String(date.getMinutes()).padStart(2, '0');
                return `${month}-${day} ${hour}:${minute}`;
            }
            // 回退到日期字符串
            if (dateStr) {
                return dateStr;
            }
            return '-';
        }
        
        // ========== 报告模块 ==========
        
        async function loadTodayReport() {
            const container = document.getElementById('today-report');
            try {
                const res = await fetch(`${API_BASE}/reports/today`);
                if (!res.ok) {
                    throw new Error(`服务器错误 (${res.status})`);
                }
                const text = await res.text();
                const data = text ? JSON.parse(text) : null;
                
                if (!data || data.status === 'not_found' || !data.id) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📄</div>
                            <p>今天还没有报告，点击上方"生成新报告"按钮创建！</p>
                        </div>
                    `;
                } else {
                    // 兼容后端字段名：report_date -> date, podcast_status -> status
                    const reportDate = formatDateTime(data.report_date || data.date, data.created_at);
                    const reportStatus = data.status || 'pending';
                    container.innerHTML = `
                        <div class="report-meta">
                            <span>📅 生成于 ${reportDate}</span>
                            <span class="status status-${reportStatus === 'completed' ? 'completed' : 'pending'}">${reportStatus}</span>
                        </div>
                        <h4 style="margin-bottom: 15px; font-size: 1.2rem;">${data.title || '每日财经简报'}</h4>
                        <div class="report-content">${data.content || '报告内容生成中...'}</div>
                    `;
                }
            } catch (err) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>加载失败：${err.message}</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">请确保后端服务正在运行 (localhost:9090)</p>
                    </div>
                `;
            }
        }
        
        // 存储所有报告数据，用于查看历史报告
        let allReports = [];
        
        async function loadReportsList() {
            const container = document.getElementById('reports-list');
            try {
                const res = await fetch(`${API_BASE}/reports/`);
                if (!res.ok) {
                    throw new Error(`服务器错误 (${res.status})`);
                }
                const text = await res.text();
                const data = text ? JSON.parse(text) : [];
                
                // 保存完整数据
                allReports = data;
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">📂</div>
                            <p>暂无历史报告</p>
                        </div>
                    `;
                } else {
                    // 只显示最近5个报告
                    const recentReports = data.slice(0, 5);
                    const hasMore = data.length > 5;
                    
                    container.innerHTML = `
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>生成时间</th>
                                    <th>标题</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${recentReports.map(report => {
                                    // 使用精确时间格式化
                                    const reportDate = formatDateTime(report.report_date || report.date, report.created_at);
                                    const reportStatus = report.status || 'pending';
                                    return `
                                    <tr>
                                        <td>${reportDate}</td>
                                        <td>${report.title || '每日财经简报'}</td>
                                        <td><span class="status status-${reportStatus === 'completed' ? 'completed' : 'pending'}">${reportStatus}</span></td>
                                        <td><button class="btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;" onclick="viewReport('${report.id}')">📖 查看</button></td>
                                    </tr>
                                `}).join('')}
                            </tbody>
                        </table>
                        ${hasMore ? `<p style="text-align: center; color: rgba(255,255,255,0.5); margin-top: 15px; font-size: 0.9rem;">仅显示最近 5 份报告（共 ${data.length} 份）</p>` : ''}
                    `;
                }
            } catch (err) {
                container.innerHTML = `<p style="color: rgba(255,255,255,0.5);">加载失败</p>`;
            }
        }
        
        // 查看历史报告
        async function viewReport(reportId) {
            const container = document.getElementById('today-report');
            
            // 先显示加载状态
            container.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <div class="loading"></div>
                    <span>加载报告中...</span>
                </div>
            `;
            
            try {
                const res = await fetch(`${API_BASE}/reports/${reportId}`);
                if (!res.ok) {
                    throw new Error(`加载失败 (${res.status})`);
                }
                const data = await res.json();
                
                const reportDate = formatDateTime(data.report_date || data.date, data.created_at);
                const reportStatus = data.status || 'pending';
                
                container.innerHTML = `
                    <div class="report-meta">
                        <span>📅 生成于 ${reportDate}</span>
                        <span class="status status-${reportStatus === 'completed' ? 'completed' : 'pending'}">${reportStatus}</span>
                        <span style="color: #ffc107;">📚 历史报告</span>
                    </div>
                    <h4 style="margin-bottom: 15px; font-size: 1.2rem;">${data.title || '每日财经简报'}</h4>
                    <div class="report-content">${data.content || '报告内容为空'}</div>
                    <button class="btn btn-secondary" style="margin-top: 20px;" onclick="loadTodayReport()">← 返回今日报告</button>
                `;
            } catch (err) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <p>加载失败：${err.message}</p>
                        <button class="btn btn-secondary" style="margin-top: 15px;" onclick="loadTodayReport()">← 返回今日报告</button>
                    </div>
                `;
            }
        }
        
        // 记录当前报告ID，用于判断是否生成了新报告
        let currentReportId = null;
        
        async function generateReport() {
            showToast('🚀 正在生成报告，请稍候...', 'success');
            
            // 显示生成中状态
            const todayContainer = document.getElementById('today-report');
            todayContainer.innerHTML = `
                <div style="text-align: center; padding: 30px;">

                if (data.status === 'success') {

            } catch (err) {
                clearInterval(timerInterval);

                console.log('[DEBUG] 错误类型:', err.name);
                console.log('[DEBUG] 错误详情:', err.stack);
                if (err.name === 'TimeoutError') {
                    showToast('⚠️ 请求超时，请稍后刷新查看', 'error');

        async function regeneratePodcast(reportId) {
            const container = document.getElementById('today-podcast');
            
            // 显示生成中状态
            container.innerHTML = `
                <div class="podcast-player">
                    <div style="text-align: center; padding: 30px;">
                        <div class="loading" style="width: 40px; height: 40px; border-width: 3px; margin: 0 auto 20px;"></div>
                        <h4 style="margin-bottom: 10px;">🎙️ 正在重新生成播客...</h4>
                        <p style="color: rgba(255,255,255,0.6);" id="podcast-gen-status">正在准备文本...</p>
                        <p style="color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 10px;">预计需要 30-60 秒，请耐心等待...</p>
                        <p style="color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-top: 5px;" id="podcast-gen-timer">已等待: 0 秒</p>
                    </div>
                </div>
            `;
            
            // 启动计时器
            let seconds = 0;
            const timerInterval = setInterval(() => {
                seconds++;
                const timerEl = document.getElementById('podcast-gen-timer');
                if (timerEl) {
                    timerEl.textContent = `已等待: ${seconds} 秒`;
                }
                // 更新状态提示
                const statusEl = document.getElementById('podcast-gen-status');
                if (statusEl) {
                    if (seconds < 5) {
                        statusEl.textContent = '正在准备播客文本...';
                    } else if (seconds < 15) {
                        statusEl.textContent = '正在调用 TTS 引擎...';
                    } else if (seconds < 30) {
                        statusEl.textContent = '正在合成语音...';
                    } else if (seconds < 45) {
                        statusEl.textContent = '正在处理音频文件...';
                    } else {
                        statusEl.textContent = '即将完成...';
                    }
                }
            }, 1000);
            
            try {
                // 1. 先发起重新生成请求
                const res = await fetch(`${API_BASE}/podcasts/${reportId}/regenerate`, { 
                    method: 'POST'
                });
                
                if (!res.ok) {
                    throw new Error(`服务器错误 (${res.status})`);
                }
                
                // 2. 轮询检查播客生成状态，直到完成或超时
                const maxWaitSeconds = 180; // 最多等待3分钟
                let isCompleted = false;
                
                while (seconds < maxWaitSeconds && !isCompleted) {
                    await new Promise(resolve => setTimeout(resolve, 2000)); // 每2秒检查一次
                    
                    try {
                        const statusRes = await fetch(`${API_BASE}/podcasts/${reportId}/status`);
                        if (statusRes.ok) {
                            const statusData = await statusRes.json();
                            if (statusData.status === 'ready') {
                                isCompleted = true;
                            } else if (statusData.status === 'error') {
                                throw new Error('播客生成失败');
                            }
                        }
                    } catch (pollErr) {
                        console.log('轮询状态出错:', pollErr);
                    }
                }
                
                clearInterval(timerInterval);
                
                if (isCompleted) {
                    showToast('✅ 播客生成完成！', 'success');
                } else {
                    showToast('⚠️ 播客生成仍在进行中，请稍后刷新', 'success');
                }
                
                // 重新加载播客显示
                loadTodayPodcast();
                loadPodcastHistory();
                
            } catch (err) {
                clearInterval(timerInterval);
                showToast('❌ 生成失败：' + err.message, 'error');
                loadTodayPodcast();
            }
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadTodayReport();
            loadReportsList();
        });
    </script>
</body>
</html>
